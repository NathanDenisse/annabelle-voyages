  <!-- Camera icon -->
  <rect x="160" y="115" width="80" height="60" rx="8" fill="#7D5E60" opacity="0.25"/>
  <circle cx="200" cy="145" r="18" fill="#5C4345" opacity="0.2"/>
  <rect x="175" y="108" width="25" height="10" rx="4" fill="#7D5E60" opacity="0.25"/>
